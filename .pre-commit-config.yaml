# The data quality app under _static is a generated bundle installed by
# interactive_plots' `make deploy`, not source. Hooks that reformat files would
# fight its output (vite leaves trailing whitespace in the minified bundle) and
# break on every redeploy.
exclude: ^_static/dp2_data_quality/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-toml

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types:
          - json
          - yaml

  - repo: https://github.com/asottile/blacken-docs
    rev: 1.20.0
    hooks:
      - id: blacken-docs
        additional_dependencies: [black==25.1.0]
        args: [-l, "79", -t, py312]
